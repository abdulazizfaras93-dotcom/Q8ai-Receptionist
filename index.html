<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Q8ai Receptionist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0D1A; --surface: #111428; --surface2: #181C35;
      --border: rgba(124,58,237,0.18); --purple: #7C3AED; --teal: #0EA5E9;
      --purple-glow: rgba(124,58,237,0.35); --text: #F1F5F9; --muted: #94A3B8; --radius: 1.2rem;
    }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .shell { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
    .shell::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(ellipse, var(--purple-glow) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 10; display: flex; align-items: center; gap: 14px; padding: 18px 20px 16px; background: linear-gradient(180deg,rgba(17,20,40,0.98) 0%,rgba(17,20,40,0.92) 100%); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .logo-wrap { width: 46px; height: 46px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: #000; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .header-text h1 { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: 0.02em; background: linear-gradient(90deg,#fff 0%,#A78BFA 60%,var(--teal) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-text p { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .status-dot { margin-left: auto; width: 9px; height: 9px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.7); flex-shrink: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 1; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; flex-direction: column; max-width: 85%; animation: fadeUp 0.25s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.bot .bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); }
    .msg.user .bubble { background: linear-gradient(135deg,var(--purple),#6366F1); border-top-right-radius: 4px; color: #fff; box-shadow: 0 4px 20px var(--purple-glow); }
    .msg-time { font-size: 0.65rem; color: var(--muted); margin-top: 4px; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }
    .typing-indicator { display: none; align-self: flex-start; max-width: 85%; }
    .typing-indicator.active { display: flex; }
    .typing-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 4px; border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 6px; }
    .typing-bubble span { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); animation: blink 1.2s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; background: #A78BFA; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; background: var(--teal); }
    @keyframes blink { 0%,80%,100% { opacity:0.3; transform:scale(0.8); } 40% { opacity:1; transform:scale(1.1); } }
    .input-area { position: relative; z-index: 10; padding: 12px 16px 20px; background: linear-gradient(0deg,rgba(10,13,26,0.98) 0%,rgba(10,13,26,0.92) 100%); border-top: 1px solid var(--border); backdrop-filter: blur(12px); }
    .input-row { display: flex; align-items: flex-end; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 1rem; padding: 10px 10px 10px 16px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-glow); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; line-height: 1.5; resize: none; max-height: 120px; overflow-y: auto; padding: 2px 0; }
    textarea::placeholder { color: var(--muted); }
    .send-btn { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg,var(--purple),var(--teal)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; }
    .send-btn:hover { opacity:0.9; transform:scale(1.05); }
    .send-btn:active { transform:scale(0.95); }
    .send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
    .welcome { text-align: center; padding: 40px 20px; animation: fadeUp 0.4s ease both; }
    .welcome-logo { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 16px; overflow: hidden; border: 2px solid var(--border); box-shadow: 0 0 40px var(--purple-glow); background: #000; }
    .welcome-logo img { width: 100%; height: 100%; object-fit: cover; }
    .welcome h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; background: linear-gradient(90deg,#fff 0%,#A78BFA 50%,var(--teal) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .welcome p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; max-width: 280px; margin: 0 auto 20px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 0.78rem; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .chip:hover { border-color: var(--purple); color: var(--text); background: rgba(124,58,237,0.1); }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo-wrap">
      <img id="headerLogo" alt="Q8 AI Logo" />
    </div>
    <div class="header-text">
      <h1>Q8ai Receptionist</h1>
      <p>Your AI Front Desk</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <img id="welcomeLogo" alt="Q8 AI Logo" />
      </div>
      <h2>Welcome! How can I help? 👋</h2>
      <p>I'm Q8ai Receptionist — your AI front desk. Ask me anything about our services, pricing, or book an appointment.</p>
      <div class="chips">
        <div class="chip" onclick="prefill('What services do you offer?')">💼 Our services</div>
        <div class="chip" onclick="prefill('How much does it cost?')">💰 Pricing</div>
        <div class="chip" onclick="prefill('I want to book a consultation')">📅 Book a call</div>
        <div class="chip" onclick="prefill('How can I contact you?')">📞 Contact us</div>
      </div>
    </div>
    <div class="typing-indicator" id="typing">
      <div class="typing-bubble"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

  const logoSrc = 'data:image/png;base64,' + LOGO_B64;
  document.getElementById('headerLogo').src = logoSrc;
  document.getElementById('welcomeLogo').src = logoSrc;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const typingEl   = document.getElementById('typing');
  const welcomeEl  = document.getElementById('welcome');
  let sessionId    = 'receptionist-' + crypto.randomUUID();

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role) {
    if (welcomeEl) welcomeEl.style.display = 'none';
    const msg    = document.createElement('div');
    msg.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time   = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();
    msg.appendChild(bubble);
    msg.appendChild(time);
    messagesEl.insertBefore(msg, typingEl);
    scrollBottom();
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function setLoading(on) {
    sendBtn.disabled = on;
    typingEl.classList.toggle('active', on);
    if (on) scrollBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    inputEl.value = '';
    autoResize(inputEl);
    setLoading(true);
    try {
      const res  = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text, sessionId })
      });
      const data = await res.json();
      const reply = data.output || data.text || data.message || JSON.stringify(data);
      addMessage(reply, 'bot');
    } catch (e) {
      addMessage('⚠️ Connection error. Please try again.', 'bot');
    } finally {
      setLoading(false);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function prefill(text) {
    inputEl.value = text;
    inputEl.focus();
    autoResize(inputEl);
  }
</script>
