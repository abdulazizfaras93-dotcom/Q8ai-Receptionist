<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q8 AI Receptionist</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@n8n/chat/style.css" />
  <style>
    :root {
      --chat--color--primary: #e74266;
      --chat--color--primary-shade-50: #db4061;
      --chat--color--primary--shade-100: #cf3c5c;
      --chat--color--secondary: #20b69e;
      --chat--color-secondary-shade-50: #1ca08a;
      --chat--color-white: #fff;
      --chat--color-light: #f2f4f8;
      --chat--color-light-shade-50: #e6e9f1;
      --chat--color-light-shade-100: #c2c5cc;
      --chat--color-medium: #d2d4d9;
      --chat--color-dark: #101330;
      --chat--color-disabled: #d2d4d9;
      --chat--color-typing: #404040;
      --chat--spacing: 1rem;
      --chat--border-radius: 0.25rem;
      --chat--transition-duration: 0.15s;
      --chat--font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --chat--header--background: #101330;
      --chat--header--color: #f2f4f8;
      --chat--message--bot--background: #ffffff;
      --chat--message--bot--color: #101330;
      --chat--message--user--background: #20b69e;
      --chat--message--user--color: #ffffff;
      --chat--body--background: #f2f4f8;
      --chat--footer--background: #f2f4f8;
      --chat--input--background: #ffffff;
      --chat--input--send--button--color: #20b69e;
      --chat--input--send--button--background: #ffffff;
      --chat--button--background--primary: #20b69e;
      --chat--button--color--primary: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #101330;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #n8n-chat {
      height: 100vh;
      width: 100%;
    }

    .chat-message-bubble {
      max-width: 50% !important;
    }
  </style>
</head>
<body>
  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/chat.bundle.es.js';
    createChat({
      webhookUrl: 'https://ifaras911.app.n8n.cloud/webhook/77339621-5ffe-4132-afd1-8e4a706d40c2/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: false,
      initialMessages: [
        'مرحباً! أنا مساعد Q8 AI الذكي 😊\n\nHello! I\'m Q8 AI Receptionist.\n\nHow can I help you today?'
      ],
      i18n: {
        en: {
          title: 'Q8 AI Receptionist',
          subtitle: 'كيف نقدر نساعدك؟ · How can we help you?',
          inputPlaceholder: 'اكتب رسالتك هنا · Type your message here...',
          getStarted: 'Start Chat',
          closeButtonTooltip: 'Close',
        }
      }
    });
  </script>
</body>
</html>
